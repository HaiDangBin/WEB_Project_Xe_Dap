<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <title>Dịch vụ sửa chữa tại nhà</title>
    <style>
        .divider {
            width: 40px;
            height: 3px;
            background-color: #000;
        }

        /* Tùy chỉnh banner bên phải */
        .promo-banner {
            background: linear-gradient(180deg, #57b35e 0%, #2e7d32 100%);
            /* Màu xanh lá gradient */
            color: white;
            border-radius: 10px;
            padding: 25px 15px;
            min-height: 500px;
            /* Độ cao tương đối để căn đều nội dung */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .promo-header h3 {
            background-color: #f39c12;
            /* Màu cam cho chữ Đặt Online */
            display: inline-block;
            padding: 5px 15px;
            border-radius: 5px;
            font-size: 1.2rem;
            transform: rotate(-2deg);
            /* Hơi nghiêng nhẹ cho sinh động */
        }

        .fw-black {
            font-weight: 900;
            font-size: 3.5rem;
        }

        .promo-footer .btn-warning {
            background-color: #ff9800;
            border: none;
            color: white;
            padding: 10px;
        }
    </style>
</head>

<body>
    <div class="container my-5">
        <div class="row">
            <div class="col-md-9 main-content">
                <h2 class="fw-bold mb-3">Dịch vụ sửa chữa xe điện tại nhà nhanh chóng, uy tín – Phoxedien.com</h2>
                <div class="divider mb-4"></div>

                <div class="product-image text-center">
                    <img src="assets/img/TAILGJY33.jpg" class="img-fluid" alt="Xe điện" style="width: 50%;">
                </div>

            </div>

            <div class="col-md-3">
                <div class="promo-banner text-center d-flex flex-column justify-content-between">
                    <div class="promo-header">
                        <h3 class="text-uppercase fw-bold">Đặt Online</h3>
                        <p class="mb-0">GIẢM NGAY</p>
                        <h2 class="display-4 fw-black">500K</h2>
                    </div>

                    <div class="promo-images">
                        <img src="group-bikes.png" class="img-fluid" alt="Dòng xe điện">
                    </div>

                    <div class="promo-footer">
                        <a href="#" class="btn btn-warning fw-bold w-100 text-uppercase">Đăng ký ngay</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
