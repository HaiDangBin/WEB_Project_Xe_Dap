<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Bike Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-img-top {
            height: 200px;
            object-fit: cover;
        }

        .product-card:hover {
            transform: translateY(-5px);
            transition: 0.3s;
            shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">E-BIKE SHOP</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" href="index.html">Sản phẩm</a>
                <a class="nav-link btn btn-primary text-white ms-3" href="#">Giỏ hàng (<span
                        id="cart-count">0</span>)</a>
            </div>
        </div>
    </nav>

    <header class="bg-white py-5 mb-4 shadow-sm text-center">
        <h1 class="display-4 fw-bold">Xe Đạp Điện Thế Hệ Mới</h1>
        <p class="lead text-muted">Bền bỉ - Tiết kiệm - Thân thiện môi trường</p>
    </header>

    <div class="container">
        <div class="row" id="product-list"></div>
    </div>

    <script src="js/data.js"></script>
    <script>
        const productList = document.getElementById('product-list');
        let cartCount = 0;

        function renderProducts() {
            products.forEach(p => {
                productList.innerHTML += `
                    <div class="col-md-4 mb-4">
                        <div class="card h-100 product-card">
                            <img src="${p.img}" class="card-img-top">
                            <div class="card-body">
                                <h5 class="card-title">${p.name}</h5>
                                <p class="text-danger fw-bold">${p.price.toLocaleString()} VNĐ</p>
                                <div class="d-grid gap-2">
                                    <a href="product-detail.html?id=${p.id}" class="btn btn-outline-dark">Chi tiết</a>
                                    <button class="btn btn-primary" onclick="addToCart()">Thêm giỏ hàng</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function addToCart() {
            cartCount++;
            document.getElementById('cart-count').innerText = cartCount;
        }

        renderProducts();
    </script>
</body>

</html>
