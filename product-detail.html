<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container"><a class="navbar-brand" href="index.html">← Quay lại cửa hàng</a></div>
    </nav>

    <div class="container bg-white p-5 shadow-sm rounded">
        <div class="row" id="detail-content"></div>
    </div>

    <script src="js/data.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const id = parseInt(params.get('id'));
        const product = products.find(p => p.id === id);
        const content = document.getElementById('detail-content');

        if (product) {
            content.innerHTML = `
                <div class="col-md-6">
                    <img src="${product.img}" class="img-fluid rounded shadow">
                </div>
                <div class="col-md-6">
                    <h1 class="display-5 fw-bold">${product.name}</h1>
                    <h2 class="text-danger my-4">${product.price.toLocaleString()} VNĐ</h2>
                    <table class="table mt-4">
                        <tr><td>Loại pin:</td><td><strong>${product.battery}</strong></td></tr>
                        <tr><td>Quãng đường:</td><td><strong>${product.range}</strong></td></tr>
                        <tr><td>Bảo hành:</td><td>24 tháng</td></tr>
                    </table>
                    <p class="text-muted mt-4">${product.desc}</p>
                    <button class="btn btn-primary btn-lg w-100 mt-4">MUA NGAY</button>
                </div>
            `;
        } else {
            content.innerHTML = "<h2>Sản phẩm không tồn tại!</h2>";
        }
    </script>
</body>

</html>
